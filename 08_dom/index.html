<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulário</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>

<body>
    <main>
        <h1>Formulário</h1>

        <form id="form-inspecao">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome">

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email">

            <label for="setor">Setor</label>
            <select id="setor" name="setor">
                <option value="">Selecione...</option>
                <option value="operacao">Operação</option>
                <option value="manutencao">Manutenção</option>
                <option value="seguranca">Segurança</option>
            </select>

            <p>Prioridade</p>

            <label><input type="radio" name="prioridade" value="baixa">Baixa</label>
            <label><input type="radio" name="prioridade" value="media">Média</label>
            <label><input type="radio" name="prioridade" value="alta">Alta</label>

            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao">
            </textarea>

            <label for=""><input type="checkbox" id="termos" name="termos">Confirmo que revisei os dados</label>

            <button type="submit">Enviar</button>

            <p id="mensagem"></p>
            <p id="validacao"></p>

        </form>
    </main>
</body>

</html>
